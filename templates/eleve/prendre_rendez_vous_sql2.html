<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Rendez-vous</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <header>
    <nav class="topbar">
        <div class="logo">🏥 Système Médical</div>
        <a class="btn-retour" href="{{ url_for('eleve_dashboard') }}">⬅ Retour au Dashboard</a>
    </nav>
</header>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prendre un Rendez-vous</title>
<style>
body{font-family: Arial;background:#f5f5f5;margin:0;}
.container{
    width:45%; background:white; margin:50px auto;
    padding:25px;border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h2{text-align:center;}
input,select{
    width:100%;padding:10px;margin-bottom:15px;
    border:1px solid #bbb;border-radius:5px;
}
button{
    width:100%;padding:12px;background:#007bff;
    color:white;border:none;border-radius:5px;
}
.msg{text-align:center;color:rgb(14, 11, 185);font-weight:bold;}
</style>
</head>
<body>
<div class="container">

<h2>📅 Prendre un rendez-vous</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category,message in messages %}
<p class="msg">{{ message }}</p>
{% endfor %}
{% endwith %}

<form method="POST">

<label>Médecin :</label>
<select name="cin_medecin" required>
    <option value="">Sélectionner un médecin</option>
    {% for m in medecins %}
        <option value="{{ m.CIN }}">{{ m.nom_medecin }} {{ m.prénom_medecin }} - {{ m.spécialiste }}</option>
    {% endfor %}
</select>



<label>Date :</label>
<input type="date" name="date_rend" id="date_rend" required>

<label>Heure :</label>
<select name="heure_rend" required>
    <option value="">Sélectionner</option>
                                <option value="08:30">08:30</option>
                                <option value="09:00">09:00</option>
                                <option value="09:30">09:30</option>
                                <option value="10:00">10:00</option>
                                <option value="10:30">10:30</option>
                                <option value="11:00">11:00</option>
                                <option value="11:30">11:30</option>
                                <option value="11:30">12:00</option>
                                <option value="14:00">14:00</option>
                                <option value="14:30">14:30</option>
                                <option value="15:00">15:00</option>
                                <option value="15:30">15:30</option>
                                <option value="16:00">16:00</option>
                                <option value="16:30">16:30</option>
                                <option value="17:00">17:00</option>
                                <option value="17:30">17:30</option>

</select>


<label>Type de rendez-vous :</label>
<select name="type_rend" required>
    <option value="consultation">Consultation</option>
    <option value="urgence">Urgence</option>
    <option value="suivi">Suivi</option>
    <option value="vaccination">Vaccination</option>
</select>

<button type="submit">Valider le rendez-vous</button>
</form>
</div>

<script>
    const input = document.getElementById('datetime_rend');

    function updateMin() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');

        input.min = `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    updateMin();
</script>

</body>
</html>
